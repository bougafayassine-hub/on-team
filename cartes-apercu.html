<title>Aperçu carte — ON TEAM</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold-400:#E2B06A;--font-body:"Hanken Grotesk",sans-serif}
*{box-sizing:border-box;margin:0}
body{font-family:"Hanken Grotesk",sans-serif;background:#0E1A14;color:#F7F4ED;padding:clamp(1rem,4vw,3rem);line-height:1.5}
h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(1.5rem,4vw,2.3rem)}
.intro{max-width:60ch;color:rgba(247,244,237,.7);margin:.6rem 0 1.6rem}
.btnrow{margin-bottom:1.4rem}
.btnrow button{font-family:inherit;font-weight:700;font-size:.9rem;color:#0E261C;background:#E2B06A;border:0;border-radius:999px;padding:.6rem 1.2rem;cursor:pointer}
.stage{max-width:680px;margin:0 auto;position:relative;aspect-ratio:1/.9;border-radius:22px;overflow:hidden;border:1px solid rgba(242,200,121,.22);
  background:radial-gradient(120% 95% at 14% -4%,#16402C,transparent 52%),linear-gradient(165deg,#0C2419,#0A1E15 72%);box-shadow:0 30px 70px -30px #000}
.heromap{position:absolute;inset:0}
.heromap-svg{position:absolute;left:.4rem;right:.4rem;top:1rem;bottom:.2rem;width:auto;height:auto;overflow:hidden}
    /* ===================== CARTE MAROC RÉALISTE (hero) ===================== */
    .mm-land{fill:url(#mm-land-g);stroke:rgba(242,200,121,.5);stroke-width:1.3;stroke-linejoin:round;filter:drop-shadow(0 0 10px rgba(242,200,121,.12))}
    .mm-links{}
    .mm-link{fill:none;stroke:rgba(242,200,121,.62);stroke-width:1.4;stroke-linecap:round;filter:url(#mm-glow);stroke-dasharray:100;stroke-dashoffset:100;opacity:0}
    .mm-spark{fill:none;stroke:#FFF0CC;stroke-width:2.1;stroke-linecap:round;filter:url(#mm-glow);stroke-dasharray:9 91;stroke-dashoffset:100;opacity:0}
    .mm-city{opacity:0;transform-box:fill-box;transform-origin:center;transform:scale(.1)}
    .mm-dot{fill:var(--gold-400);filter:url(#mm-glow)}
    .mm-hq .mm-dot{fill:#FFE6B0}
    .mm-hq .mm-ring{fill:none;stroke:var(--gold-400);stroke-width:1.6;opacity:.55}
    .mm-halo{fill:url(#mm-halo)}
    .mm-lbl{fill:rgba(247,244,237,.94);font-family:var(--font-body);font-weight:600;font-size:13px;paint-order:stroke;stroke:rgba(8,22,15,.55);stroke-width:2.6px}
    .mm-hq-lbl{fill:#fff;font-weight:700;font-size:14px;paint-order:stroke;stroke:rgba(8,22,15,.6);stroke-width:3px}
    .mm-sub{fill:var(--gold-400);font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;stroke:none}
    .mm-lbl,.mm-hq-lbl{opacity:0;transition:opacity .6s}
    .heromap.in .mm-lbl,.heromap.in .mm-hq-lbl{opacity:1;transition-delay:1.5s}
    /* propagation depuis Casablanca + éclats lumineux */
    .heromap.in .mm-link{opacity:.6;animation:mmDraw .7s ease forwards;animation-delay:calc(.35s + var(--i) * .16s)}
    .heromap.in .mm-spark{animation:mmSpark 1s ease-out forwards;animation-delay:calc(.35s + var(--i) * .16s)}
    .heromap.in .mm-city{animation:mmPop .55s cubic-bezier(.3,1.3,.5,1) forwards;animation-delay:calc(.5s + var(--i) * .16s)}
    .heromap.in .mm-links{animation:mmShine 3.4s ease-in-out infinite 2.2s}
    .heromap.in .mm-hq .mm-ring{animation:mmPing 2.6s ease-out infinite 1.2s}
    @keyframes mmDraw{from{stroke-dashoffset:100}to{stroke-dashoffset:0}}
    @keyframes mmSpark{0%{stroke-dashoffset:100;opacity:0}12%{opacity:1}88%{opacity:1}100%{stroke-dashoffset:0;opacity:0}}
    @keyframes mmPop{from{opacity:0;transform:scale(.1)}to{opacity:1;transform:scale(1)}}
    @keyframes mmShine{0%,100%{opacity:.78;filter:drop-shadow(0 0 1px rgba(242,200,121,.25))}50%{opacity:1;filter:drop-shadow(0 0 5px rgba(242,200,121,.6))}}
    @keyframes mmPing{0%{r:5;opacity:.6}70%{r:19;opacity:0}100%{r:19;opacity:0}}
    @media (prefers-reduced-motion:reduce){
      .heromap.in .mm-link{opacity:.6;stroke-dashoffset:0;animation:none}
      .mm-city{opacity:1;transform:none} .mm-spark{display:none}
      .mm-lbl,.mm-hq-lbl{opacity:1}
    }
</style></head>
